<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D5FFF2"/>
      <stop offset="0.38" stop-color="#67C4CF"/>
      <stop offset="1" stop-color="#0D3D73"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 260) rotate(30) scale(860 600)">
      <stop stop-color="#F3FFF8" stop-opacity="0.86"/>
      <stop offset="1" stop-color="#E7FFF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 500) rotate(20) scale(1080 660)">
      <stop stop-color="#77CADF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#78D0E3" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurHeavy" x="-140" y="-140" width="2200" height="1360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="blurSoft" x="-100" y="-100" width="2120" height="1280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#leftGlow)"/>
  <rect width="1920" height="1080" fill="url(#centerGlow)"/>

  <g filter="url(#blurHeavy)" opacity="0.52">
    <rect x="-160" y="760" width="1180" height="380" rx="40" fill="#D8FFF5"/>
    <rect x="740" y="770" width="1260" height="360" rx="40" fill="#A7D4E9"/>
  </g>

  <g filter="url(#blurSoft)" opacity="0.46">
    <rect x="620" y="360" width="640" height="340" rx="22" fill="#4D8FCB"/>
    <rect x="680" y="412" width="520" height="230" rx="14" fill="#2F6AAF"/>
    <rect x="735" y="665" width="420" height="28" rx="14" fill="#E0EEF9"/>
  </g>

  <g filter="url(#blurHeavy)" opacity="0.4">
    <rect x="1210" y="80" width="460" height="760" rx="230" fill="#09284E"/>
    <rect x="1420" y="460" width="360" height="210" rx="105" fill="#F2B89F"/>
    <rect x="1335" y="520" width="170" height="98" rx="49" fill="#EDAA8E"/>
    <circle cx="1710" cy="560" r="70" fill="#F6CCB8"/>
  </g>

  <rect width="1920" height="1080" fill="#0A2B5E" fill-opacity="0.2"/>
</svg>